cmake_minimum_required(VERSION 3.15)
project(elleauto LANGUAGES CXX)

set(CMAKE_CXX_STANDARD 17)

# 🚀 FIX: Map your local repository path to act as the primary OpenCL search route
include_directories(${CMAKE_CURRENT_SOURCE_DIR}/include)

add_executable(elleauto 
    src/main.cpp 
    src/stratum_parser.cpp
    src/opencl_manager.cpp
)

# 🚀 FIX: Link directly to OpenCL.dll using standard Windows lookup paths.
# This forces compilation to pass without needing active GPU hardware on the runner.
target_link_libraries(elleauto PRIVATE OpenCL ws2_32)

# AUTOMATION: Keep copying autolykos.cl to the output directory on build
add_custom_command(TARGET elleauto POST_BUILD
    COMMAND ${CMAKE_COMMAND} -E copy_if_different
    "${CMAKE_CURRENT_SOURCE_DIR}/src/autolykos.cl"
    "$<TARGET_FILE_DIR:elleauto>/autolykos.cl"
)
