name: Production Release Pipeline

on:
  push:
    # 🚀 PUSH TRIGGERS: Runs a check on every main/master branch update
    branches: [ "main", "master" ]
    # 🚀 TAG TRIGGER: Automatically generates a downloadable zip release on version numbers
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-release:
    runs-on: windows-latest
    # 🚀 FIX: This block explicitly authorizes the runner to write your Release assets
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25.x'

    - name: Configure CMake
      run: cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -B build -S .

    - name: Compile Release Binary
      run: cmake --build build --config Release

    - name: Verify Binary Output
      run: |
        if (Test-Path "build/elleauto.exe") {
            echo "Success: elleauto.exe compiled cleanly!"
        } else {
            echo "Error: Output binary missing."
            exit 1
        }

    - name: Package Artifacts
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir dist
        copy build\elleauto.exe dist\
        copy src\autolykos.cl dist\
        compress-archive -Path dist\* -DestinationPath elleauto-windows-x64.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: elleauto-windows-x64.zip
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
