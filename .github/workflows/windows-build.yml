name: Continuous Release Packaging Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Files
      uses: actions/checkout@v4

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25.x'

    - name: Configure CMake
      run: cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -B build -S .

    - name: Compile Release Binary
      run: cmake --build build --config Release

    - name: Package Rolling Artifacts
      run: |
        mkdir dist
        copy build\elleauto.exe dist\
        copy src\autolykos.cl dist\
        compress-archive -Path dist\* -DestinationPath elleauto-rolling-x64.zip

    - name: Update Continuous Rolling Release
      uses: softprops/action-gh-release@v2
      with:
        files: elleauto-rolling-x64.zip
        name: "Continuous Rolling Build"
        tag_name: "rolling"     # 🚀 Key: This pins the zip to a permanent rolling asset marker
        make_latest: true
        draft: false
        prerelease: true        # Marked as prerelease so it stays clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
