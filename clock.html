<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified 5-Part Clock Core</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5a059;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #66fcf1;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .clock-container {
            width: 90vw;
            max-width: 800px;
            background: #1f2833;
            border: 1px solid #c5a059;
            padding: 15px;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.1);
        }

        .track {
            margin: 12px 0;
            position: relative;
        }

        .track-label {
            font-size: 0.75rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        canvas {
            width: 100%;
            height: 50px;
            background: #0b0c10;
            border-left: 2px solid #c5a059;
            border-right: 2px solid #c5a059;
            display: block;
        }

        .intersection-label {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }
        
        #canvas-4 {
            border: 1px solid #ffffff;
            height: 70px;
        }
    </style>
</head>
<body>

    <h1>Single-Axis Five-Part Clock</h1>
    <div class="subtitle">Inverted Intersecting Reflection Matrix Configuration</div>

    <div class="clock-container">
        <!-- Part 1: Cyan -->
        <div class="track">
            <div class="track-label"><span id="lbl-0">PART I: INITIALIZING...</span><span style="color: #66fcf1;">Fib: 2</span></div>
            <canvas id="canvas-0"></canvas>
        </div>
        <!-- Part 2: Magenta -->
        <div class="track">
            <div class="track-label"><span id="lbl-1">PART II: INITIALIZING...</span><span style="color: #ff007f;">Fib: 5</span></div>
            <canvas id="canvas-1"></canvas>
        </div>
        <!-- Part 3: Amber -->
        <div class="track">
            <div class="track-label"><span id="lbl-2">PART III: INITIALIZING...</span><span style="color: #ffb703;">Fib: 13</span></div>
            <canvas id="canvas-2"></canvas>
        </div>
        <!-- Part 4: Emerald -->
        <div class="track">
            <div class="track-label"><span id="lbl-3">PART IV: INITIALIZING...</span><span style="color: #06d6a0;">Fib: 21</span></div>
            <canvas id="canvas-3"></canvas>
        </div>
        <!-- Part 5: Unified Matrix Intersection -->
        <div class="track">
            <div class="track-label"><span id="lbl-4" class="intersection-label">PART V (MATRIX CORE): INITIALIZING...</span><span style="color: #ffffff;">INTERSECT ZONE</span></div>
            <canvas id="canvas-4"></canvas>
        </div>
    </div>

    <script>
        // FIXED: Array values are explicitly initialized to prevent browser crash
        const TRUNCATED_FIB = [2, 5, 13, 21];
        
        const clockParts = [
            { color: '#66fcf1', baseFrequency: 0.0008, spawnRate: 0.02, decayRate: 0.015, fibModifier: TRUNCATED_FIB[0], blocks: [], currentX: 0 },
            { color: '#ff007f', baseFrequency: 0.0012, spawnRate: 0.04, decayRate: 0.035, fibModifier: TRUNCATED_FIB[1], blocks: [], currentX: 0 },
            { color: '#ffb703', baseFrequency: 0.0005, spawnRate: 0.015, decayRate: 0.010, fibModifier: TRUNCATED_FIB[2], blocks: [], currentX: 0 },
            { color: '#06d6a0', baseFrequency: 0.0018, spawnRate: 0.05, decayRate: 0.050, fibModifier: TRUNCATED_FIB[3], blocks: [], currentX: 0 }
        ];

        const matrixCore = {
            blocks: []
        };

        const canvases = [];
        const ctxs = [];
        
        for (let i = 0; i <= 4; i++) {
            const canvas = document.getElementById(`canvas-${i}`);
            canvases.push(canvas);
            ctxs.push(canvas.getContext('2d'));
            canvas.width = 800;
            canvas.height = 100; 
        }

        function runningEngineLoop(timestamp) {
            
            // --- STEP 1: CALCULATE DRIVERS AND CACHE POSITIONS ---
            clockParts.forEach((part, i) => {
                const rawSway = Math.log1p(Math.abs(Math.sin(timestamp * part.baseFrequency)));
                const operationalPhase = rawSway * part.fibModifier;
                
                part.currentX = canvases[i].width * (0.1 + (Math.abs(Math.sin(operationalPhase)) * 0.8));
            });

            // --- STEP 2: PROCESS AND DRAW THE CHANNELS I - IV ---
            clockParts.forEach((part, i) => {
                const ctx = ctxs[i];
                const canvas = canvases[i];
                
                ctx.fillStyle = '#0b0c10';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (Math.random() < part.spawnRate) {
                    part.blocks.push({
                        x: part.currentX,
                        width: 30 + (part.fibModifier * 1.5),
                        alpha: 1.0
                    });

                    const prevTrackIndex = (i === 0) ? 3 : i - 1;
                    const prevTrackSource = clockParts[prevTrackIndex];

                    matrixCore.blocks.push({
                        spawnOriginX: prevTrackSource.currentX, 
                        targetTrajectoryX: part.currentX,      
                        progress: 0.0,                         
                        width: 20 + (part.fibModifier * 1.2),  
                        color: part.color,                     
                        decayRate: part.decayRate * 0.8        
                    });
                }

                for (let b = part.blocks.length - 1; b >= 0; b--) {
                    const block = part.blocks[b];
                    ctx.save();
                    ctx.globalAlpha = block.alpha;
                    ctx.fillStyle = part.color;
                    ctx.fillRect(block.x - (block.width / 2), 0, block.width, canvas.height);
                    ctx.restore();

                    block.alpha -= part.decayRate;
                    if (block.alpha <= 0) part.blocks.splice(b, 1);
                }

                document.getElementById(`lbl-${i}`).innerText = 
                    `PART ${['I', 'II', 'III', 'IV'][i]} -> AXIS POS: ${Math.floor(part.currentX)}px | REGISTERS: ${part.blocks.length}`;
            });

            // --- STEP 3: RENDER THE MATRIX REVERSAL HARVESTER (PART V) ---
            const mCtx = ctxs[4];
            const mCanvas = canvases[4];
            mCtx.fillStyle = '#11141a'; 
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);

            for (let m = matrixCore.blocks.length - 1; m >= 0; m--) {
                const bCore = matrixCore.blocks[m];

                const totalVectorDistance = bCore.targetTrajectoryX - bCore.spawnOriginX;
                const dynamicCurrentLocationX = bCore.spawnOriginX + (totalVectorDistance * (1.0 - bCore.progress));

                mCtx.save();
                mCtx.globalAlpha = 1.0 - bCore.progress; 
                mCtx.fillStyle = bCore.color;
                mCtx.fillRect(dynamicCurrentLocationX - (bCore.width / 2), 0, bCore.width, mCanvas.height);
                mCtx.restore();

                bCore.progress += bCore.decayRate;

                if (bCore.progress >= 1.0) {
                    matrixCore.blocks.splice(m, 1);
                }
            }

            document.getElementById(`lbl-4`).innerText = 
                `MATRIX INTERSECT CORE ACTIVE -> REVERSAL ACTIVE SLOTS: ${matrixCore.blocks.length}`;

            requestAnimationFrame(runningEngineLoop);
        }

        requestAnimationFrame(runningEngineLoop);
    </script>
</body>
</html>
